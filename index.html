<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SPINGUIM's Website</title>

    <link rel="icon" href="favicon.ico" sizes="any" />

    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .center-title {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        text-align: center;
        width: 100%;
        justify-content: center;
        font: 800 clamp(40px, 10vw, 120px)/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #00ff41;
        letter-spacing: 4px;
        z-index: 5;
        pointer-events: none;
     }
    </style>
  </head>

  <body>
    <div class="center-title">SPINGUIM's Website</div>
    <canvas id="c"></canvas>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 2000);

      const radius = 100;
      const geometry = new THREE.SphereGeometry(radius, 140, 70);

      const texture = new THREE.TextureLoader().load(
        "https://threejs.org/examples/textures/sprites/circle.png"
      );

      const material = new THREE.PointsMaterial({
        color: 0x00ff41,
        size: 1.4,
        map: texture,
        transparent: true,
        depthWrite: true,
        blending: THREE.NormalBlending,
        opacity: 0.9
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      function applyResponsive() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        renderer.setPixelRatio(dpr);
        renderer.setSize(w, h, false);

        camera.aspect = w / h;
        camera.updateProjectionMatrix();

        const minSide = Math.min(w, h);
        const t = Math.min(Math.max((minSide - 320) / (900 - 320), 0), 1);

        const isMobile = window.innerWidth < 600;

        if (isMobile) {
          camera.position.z = 360;
          material.size = 1.2 / dpr;
        } else {
          camera.position.z = 280 - t * 80;
          material.size = (2.2 - t * 0.8) / dpr;
        }

        material.needsUpdate = true;
        material.size = (2.2 - t * 0.8) / dpr;
        material.needsUpdate = true;
      }

      function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.002;
        points.rotation.x += 0.001;
        renderer.render(scene, camera);
      }

      applyResponsive();
      animate();

      window.addEventListener("resize", applyResponsive);
      window.addEventListener("orientationchange", applyResponsive);

      document.addEventListener("gesturestart", (e) => e.preventDefault(), { passive: false });
    </script>
  </body>
</html>
